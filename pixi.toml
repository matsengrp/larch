[workspace]
authors = ["marybarker <marybarker103@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "larch"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# --- Without usher (mock) ---
configure-mock = "cmake -S . -B build-mock -DCMAKE_BUILD_TYPE=Debug -DUSE_USHER=no -DTBB_DISABLE_HWLOC_AUTOMATIC_SEARCH=ON"
build-mock = { cmd = "cmake --build build-mock -j32", depends-on = ["configure-mock"] }
setup-test-mock = { cmd = "mkdir -p build-mock/tests && ln -sfn ../../data build-mock/tests/data", depends-on = ["configure-mock"] }
test-mock = { cmd = "cd build-mock/tests && ../bin/larch-test", depends-on = ["build-mock", "setup-test-mock"] }

# --- With usher ---
configure = "cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DUSE_USHER=yes -DTBB_DISABLE_HWLOC_AUTOMATIC_SEARCH=ON"
build = { cmd = "cmake --build build -j32", depends-on = ["configure"] }
setup-test = { cmd = "mkdir -p build/tests && ln -sfn ../../data build/tests/data", depends-on = ["configure"] }
test = { cmd = "cd build/tests && ../bin/larch-test", depends-on = ["build", "setup-test"] }

[dependencies]
python = "*"
gcc = ">=12.4.0,<14.0.0"
gxx = ">=12.4.0,<14.0.0"
cmake = ">=3.19.6"
make = "*"
openmpi-mpicc = ">=4.1.0,<5.0"
openmpi-mpicxx = ">=4.1.0,<5.0"
automake = "*"
autoconf = "*"
libtool = "*"
yasm = "*"
openssh = "*"
protobuf = "3.12.3.*"
openmpi = ">=4.1.0,<5.0"
boost-cpp = "1.82.*"
ucx = ">=1.16.0"
zlib = ">=1.2"
libhwloc = "*"
